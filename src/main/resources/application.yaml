server:
  port: 8089
  servlet:
    context-path: /api

spring:
  application:
    name: seveneleven-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

mybatis:
  mapper-locations: classpath:mybatis.mapper/*.xml
  type-aliases-package: com.interview.demo.entity

logging:
  level:
    org.mybatis: DEBUG
    org.apache.ibatis: DEBUG